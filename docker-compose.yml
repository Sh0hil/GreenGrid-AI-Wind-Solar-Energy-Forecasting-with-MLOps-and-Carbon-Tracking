services:
  backend:
    image: sh0hil/green-grid-ai-backend:latest
    container_name: green-grid-ai-backend
    ports:
      - "8000:8000"
    restart: always

  frontend:
    image: sh0hil/green-grid-ai-frontend:latest
    container_name: green-grid-ai-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: always